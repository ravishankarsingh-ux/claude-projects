name: Deploy websites to GitHub Pages

on:
  push:
    branches:
      - claude/motion-installation-hvig75
      - main
    paths:
      - "devadigm-website/**"
      - "school-website/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site (devadigm at root, school site at /school-website/)
        run: |
          mkdir -p _site
          cp -r devadigm-website/. _site/
          cp -r school-website _site/school-website

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
